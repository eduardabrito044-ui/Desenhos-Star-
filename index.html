<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio de Desenho Estelar</title>
    <style>
        :root {
            --primary-blue: #007bff; /* Azul vibrante */
            --dark-blue: #003d80; /* Azul escuro para contraste */
            --star-gold: #ffeb3b; /* Amarelo ouro para as estrelas ativas */
            --bg-white: #ffffff;
            --light-gray: #f1f3f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--light-gray);
            overflow: hidden;
            touch-action: none; /* Impede zoom acidental */
        }

        /* Barra de Ferramentas Estelar */
        .toolbar {
            background-color: var(--primary-blue);
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select, button {
            padding: 10px 15px;
            border-radius: 20px; /* Bordas arredondadas */
            border: 2px solid white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Estilo Base para Botões */
        button { 
            background-color: white; 
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Estilo para Botões Ativos (com Estrela) */
        button.active { 
            background-color: var(--dark-blue); 
            color: var(--star-gold); /* Estrela amarela quando ativa */
            border-color: var(--star-gold);
        }

        /* Botão Salvar Estelar */
        .btn-save { 
            background-color: var(--star-gold) !important; 
            color: var(--dark-blue) !important; 
            border-color: var(--dark-blue) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
        }
        .btn-save.active { background-color: var(--dark-blue) !important; color: var(--star-gold) !important; }

        /* Botão Limpar Estelar */
        .btn-clear { 
            background-color: #ff4d4d !important; 
            color: white !important; 
            border-color: white !important;
        }

        /* Inputs Estilizados */
        input[type="color"] { 
            width: 40px; 
            height: 40px; 
            border: 2px solid white; 
            border-radius: 50%; 
            background: none; 
            cursor: pointer; 
        }

        input[type="range"] { 
            cursor: pointer; 
            accent-color: white; /* Cor da bolinha no Chrome/Edge */
        }

        /* Ícone de Estrela */
        .star-icon {
            font-size: 1.2em;
        }

        /* Área do Canvas */
        #canvas-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #d1d1d1; /* Fundo da "mesa" */
            padding: 10px;
        }

        .layer-container {
            position: relative;
            background: white;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            overflow: hidden; /* Garante que o grid não saia */
        }

        #gridCanvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none; /* Não interfere no clique */
        }

        #drawingCanvas {
            position: relative;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }

        /* Barra de Status */
        #status-bar {
            background: var(--dark-blue);
            color: white;
            font-size: 11px;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <select id="sheetType">
                <option value="none">Folha Branca</option>
                <option value="grid">Quadriculado</option>
                <option value="millimetric">Milimetrado</option>
            </select>
        </div>

        <div class="tool-group">
            <input type="color" id="colorPicker" value="#000000">
            <input type="range" id="lineWidth" min="1" max="50" value="5">
        </div>

        <div class="tool-group">
            <button id="penBtn" class="active">
                <span class="star-icon">&#9733;</span> Caneta
            </button>
            <button id="eraserBtn">
                <span class="star-icon">&#9733;</span> Borracha
            </button>
        </div>

        <div class="tool-group">
            <button onclick="clearCanvas()" class="btn-clear">
                <span class="star-icon">&#9733;</span> Limpar
            </button>
            <button onclick="saveImage()" class="btn-save">
                <span class="star-icon">&#9733;</span> SALVAR NO CELULAR
            </button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <div class="layer-container">
            <canvas id="gridCanvas"></canvas>
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <div id="status-bar">
        <span id="coordDisplay">Toque na estrela para começar</span>
        <span>Studio de Desenho Estelar v4.0</span>
    </div>

    <script>
        const dCanvas = document.getElementById('drawingCanvas');
        const gCanvas = document.getElementById('gridCanvas');
        const dCtx = dCanvas.getContext('2d');
        const gCtx = gCanvas.getContext('2d');
        const coordDisplay = document.getElementById('coordDisplay');
        const sheetType = document.getElementById('sheetType');

        let painting = false;
        let isEraser = false;
        
        // PRECISÃO 1:1 - O traço fica EXATAMENTE no lugar do toque.
        const touchOffsetY = 0; 

        function init() {
            // Define um tamanho bom para celular e PC
            const width = window.innerWidth > 800 ? 1000 : window.innerWidth * 0.95;
            const height = window.innerHeight * 0.7;
            
            dCanvas.width = gCanvas.width = width;
            dCanvas.height = gCanvas.height = height;
            
            dCtx.lineCap = 'round';
            dCtx.lineJoin = 'round';
            updateGrid();
        }

        function updateGrid() {
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            gCtx.fillStyle = "white"; // A folha permanece branca
            gCtx.fillRect(0, 0, gCanvas.width, gCanvas.height);

            const type = sheetType.value;
            if (type === 'none') return;

            gCtx.beginPath();
            let step = type === 'grid' ? 30 : 10;
            gCtx.strokeStyle = type === 'grid' ? "#d1d1d1" : "#f0c0c0"; // Cores sutis para o grid
            gCtx.lineWidth = 0.5;

            for (let x = 0; x <= gCanvas.width; x += step) {
                gCtx.moveTo(x, 0); gCtx.lineTo(x, gCanvas.height);
            }
            for (let y = 0; y <= gCanvas.height; y += step) {
                gCtx.moveTo(0, y); gCtx.lineTo(gCanvas.width, y);
            }
            gCtx.stroke();
        }

        function getPos(e) {
            const rect = dCanvas.getBoundingClientRect();
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            // Corrige a posição considerando o scroll e o zoom
            const scaleX = dCanvas.width / rect.width;
            const scaleY = dCanvas.height / rect.height;

            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            
            // Offset para touch (agora é 0, traço no dedo)
            if (e.touches) y += touchOffsetY; 
            
            return { x, y };
        }

        function start(e) {
            painting = true;
            // Desenha um ponto no clique/toque inicial para precisão
            draw(e); 
        }

        function stop() {
            painting = false;
            dCtx.beginPath(); // Recomeça o caminho para evitar linhas fantasmas
        }

        function draw(e) {
            if (!painting) return;
            const pos = getPos(e);
            
            coordDisplay.innerText = `Posição - X: ${Math.round(pos.x)} Y: ${Math.round(pos.y)}`;

            dCtx.lineWidth = document.getElementById('lineWidth').value;
            // Cor da caneta ou branco para a borracha
            dCtx.strokeStyle = isEraser ? "white" : document.getElementById('colorPicker').value;

            // Cria a linha
            dCtx.lineTo(pos.x, pos.y);
            dCtx.stroke();
            dCtx.beginPath();
            dCtx.moveTo(pos.x, pos.y);
        }

        // Eventos de Mouse e Touch unificados
        dCanvas.addEventListener('mousedown', start);
        window.addEventListener('mouseup', stop);
        dCanvas.addEventListener('mousemove', draw);
        
        // preventDefault() impede o scroll da página enquanto desenha
        dCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        dCanvas.addEventListener('touchend', (e) => { e.preventDefault(); stop(); });
        dCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        sheetType.addEventListener('change', updateGrid);

        // Controles de Ferramentas
        document.getElementById('penBtn').onclick = function() {
            isEraser = false;
            this.classList.add('active');
            document.getElementById('eraserBtn').classList.remove('active');
        };

        document.getElementById('eraserBtn').onclick = function() {
            isEraser = true;
            this.classList.add('active');
            document.getElementById('penBtn').classList.remove('active');
        };

        function clearCanvas() {
            if (confirm("Deseja apagar todo o desenho estelar?")) dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        }

        // Função para Salvar a Arte
        function saveImage() {
            // Cria um canvas temporário para fundir o desenho com o grid
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = dCanvas.width;
            saveCanvas.height = dCanvas.height;
            const sCtx = saveCanvas.getContext('2d');
            
            // 1. Desenha o fundo e o grid
            sCtx.drawImage(gCanvas, 0, 0);
            // 2. Desenha a arte por cima
            sCtx.drawImage(dCanvas, 0, 0);
            
            // Converte para imagem e inicia o download
            const imageURI = saveCanvas.toDataURL("image/png");
            
            const link = document.createElement('a');
            link.download = 'meu-desenho-estelar.png';
            link.href = imageURI;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert("Sua obra de arte estelar foi salva na pasta de Downloads!");
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
